name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"  # Runs automatically every day at midnight UTC
  workflow_dispatch:     # Allows you to manually run it from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Aabidnabi   # <-- CHANGE THIS to your username if different
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      - name: Push changes
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output   # This creates a new branch called "output" to store the images
          build_dir: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
