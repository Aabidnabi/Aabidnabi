<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%">
  <defs>
    <style>
      text {
        font-family: monospace;
        font-size: 12px;
      }

      .typing {
        overflow: hidden;
        white-space: nowrap;
        width: 0;
        animation: typing var(--dur) steps(var(--steps)) forwards;
      }

      @keyframes typing {
        from { width: 0 }
        to { width: var(--w) }
      }

      /* timings */
      .t1 { --dur:0.6s; --steps:6;  --w:70px;  animation-delay:0.3s;}
      .t2 { --dur:1.0s; --steps:20; --w:220px; animation-delay:1.2s;}
      .t3 { --dur:1.6s; --steps:45; --w:460px; animation-delay:2.4s;}

      .t4 { --dur:1.2s; --steps:40; --w:420px; animation-delay:4.2s;}
      .t5 { --dur:1.2s; --steps:45; --w:460px; animation-delay:5.6s;}
      .t6 { --dur:1.2s; --steps:45; --w:460px; animation-delay:7.0s;}
      .t7 { --dur:1.0s; --steps:30; --w:300px; animation-delay:8.4s;}

      .t8 { --dur:1.2s; --steps:35; --w:360px; animation-delay:9.8s;}
      .t9 { --dur:1.2s; --steps:40; --w:420px; animation-delay:11.2s;}
      .t10{ --dur:1.0s; --steps:25; --w:260px; animation-delay:12.6s;}

      .t11{ --dur:1.4s; --steps:70; --w:650px; animation-delay:14.0s;}

      .t12{ --dur:0.6s; --steps:4;  --w:60px;  animation-delay:16.2s;}
    </style>
  </defs>

  <rect width="800" height="450" fill="#0d1117"/>

  <!-- header -->
  <rect width="800" height="35" fill="#161b22"/>
  <circle cx="15" cy="17.5" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="17.5" r="5" fill="#ffbd2e"/>
  <circle cx="49" cy="17.5" r="5" fill="#28c840"/>

  <text x="400" y="22" text-anchor="middle" fill="#8b949e">
    aabidnabi terminal
  </text>

  <!-- prompt -->
  <text x="20" y="70" fill="#c9d1d9">
    <tspan fill="#3fb950">aabidnabi</tspan>@<tspan fill="#58a6ff">terminal</tspan>:~$
  </text>

  <!-- whoami -->
  <text x="180" y="70" class="typing t1" fill="#e6edf3">whoami</text>

  <!-- info -->
  <text x="20" y="110" class="typing t2" fill="#e6edf3">Name: Aabid Nabi</text>
  <text x="20" y="135" class="typing t3" fill="#e6edf3">Role: Software Developer | Scalable Systems &amp; AI</text>

  <!-- focus -->
  <text x="20" y="170" class="typing t4" fill="#ff7b72">Focus:</text>
  <text x="35" y="190" class="typing t5" fill="#c9d1d9">› Production-grade system design</text>
  <text x="35" y="210" class="typing t6" fill="#c9d1d9">› Clean architecture and maintainability</text>
  <text x="35" y="230" class="typing t7" fill="#c9d1d9">› Performance optimization and scalability</text>
  <text x="35" y="250" class="typing t8" fill="#c9d1d9">› Secure System Development</text>


  <!-- interests -->
  <text x="20" y="265" class="typing t8" fill="#ff7b72">Interests:</text>
  <text x="35" y="285" class="typing t9" fill="#c9d1d9">› Applied Machine Learning</text>
  <text x="35" y="305" class="typing t10" fill="#c9d1d9">› Distributed Systems &amp; Cybersecurity</text>

  <!-- quote -->
<text x="20" y="265" class="typing t8" fill="#ff7b72">Quote:</text>
  <text x="20" y="340" class="typing t11" fill="#e3b341">
    "Performance is engineered. Security is enforced. Scalability is designed."
  </text>

  <!-- final prompt + exit -->
  <text x="20" y="380" fill="#c9d1d9">
    <tspan fill="#3fb950">aabidnabi</tspan>@<tspan fill="#58a6ff">terminal</tspan>:~$
  </text>

  <text x="180" y="380" class="typing t12" fill="#e6edf3">exit</text>

</svg>
