<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 565" width="100%">
  <defs>
    <style>
      @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideIn  { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes blink    { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

      /* Typing Animation for whoami */
      .c  { opacity: 0; animation: fadeIn 0.01s forwards; }
      .c1 { animation-delay: 0.5s; } .c2 { animation-delay: 0.6s; }
      .c3 { animation-delay: 0.7s; } .c4 { animation-delay: 0.8s; }
      .c5 { animation-delay: 0.9s; } .c6 { animation-delay: 1.0s; }

      /* Output Lines Animation */
      .ln { opacity: 0; animation: slideIn 0.3s ease-out forwards; }
      .l1  { animation-delay: 1.3s; } .l2  { animation-delay: 1.4s; }
      .l3  { animation-delay: 1.5s; } .l4  { animation-delay: 1.6s; }
      .l5  { animation-delay: 1.7s; } .l6  { animation-delay: 1.8s; }
      .l7  { animation-delay: 1.9s; } .l8  { animation-delay: 2.0s; }
      .l9  { animation-delay: 2.1s; } .l10 { animation-delay: 2.2s; }
      .l11 { animation-delay: 2.3s; } .l12 { animation-delay: 2.4s; }
      .l13 { animation-delay: 2.5s; } .l14 { animation-delay: 2.6s; }
      .l15 { animation-delay: 2.7s; } .l16 { animation-delay: 2.8s; }
      .l17 { animation-delay: 2.9s; } .l18 { animation-delay: 3.0s; }
      .l19 { animation-delay: 3.2s; } /* The bottom prompt line */

      /* Typing Animation for exit */
      .e1 { animation-delay: 3.5s; } .e2 { animation-delay: 3.6s; }
      .e3 { animation-delay: 3.7s; } .e4 { animation-delay: 3.8s; }

      /* Cursor Settings */
      .cursor { fill: #ffffff; }
      .cur1 { animation: blink 0.8s step-end infinite; }
      /* Hide first cursor after second one should start */
      .cur1-wrapper { animation: fadeIn 0.01s forwards; animation-delay: 0s; }
      .cur1-hide { animation: fadeIn 0.01s reverse forwards; animation-delay: 3.2s; }
      
      /* Final Cursor */
      .cur2 { opacity: 0; animation: fadeIn 0.01s forwards 3.8s, blink 0.8s step-end infinite 3.8s; }
    </style>
    
    <clipPath id="roundCorner">
      <rect width="800" height="565" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundCorner)">
    <rect width="800" height="565" fill="#0d1117"/>
    
    <rect width="800" height="44" fill="#161b22"/>
    <circle cx="22" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="22" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="22" r="6" fill="#28c840"/>
    <text x="400" y="28" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">aabidnabi — terminal</text>

    <text x="20" y="80" font-family="monospace" font-size="14">
      <tspan fill="#3fb950">aabidnabi</tspan><tspan fill="#8b949e">@</tspan><tspan fill="#58a6ff">terminal</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#79c0ff">~</tspan><tspan fill="#c9d1d9">$ </tspan>
      <tspan class="c c1" fill="#e6edf3">w</tspan><tspan class="c c2" fill="#e6edf3">h</tspan><tspan class="c c3" fill="#e6edf3">o</tspan><tspan class="c c4" fill="#e6edf3">a</tspan><tspan class="c c5" fill="#e6edf3">m</tspan><tspan class="c c6" fill="#e6edf3">i</tspan>
    </text>
    
    <g class="cur1-hide">
      <rect x="195" y="66" width="8" height="16" class="cursor cur1"/>
    </g>

    <g font-family="monospace" font-size="13">
      <text x="20" y="115" class="ln l1"><tspan fill="#79c0ff">Name</tspan><tspan fill="#484f58">: </tspan><tspan fill="#e6edf3">Aabid Nabi</tspan></text>
      <text x="20" y="135" class="ln l2"><tspan fill="#79c0ff">Role</tspan><tspan fill="#484f58">: </tspan><tspan fill="#e6edf3">Software Developer | Scalable Systems &amp; AI</tspan></text>
      
      <text x="20" y="165" fill="#ff7b72" class="ln l3">Focus:</text>
      <text x="35" y="185" class="ln l4" fill="#c9d1d9">› Production-grade system design</text>
      <text x="35" y="205" class="ln l5" fill="#c9d1d9">› Clean architecture and maintainability</text>
      <text x="35" y="225" class="ln l6" fill="#c9d1d9">› Performance optimization and scalability</text>
      
      <text x="20" y="255" fill="#ff7b72" class="ln l8">Interests:</text>
      <text x="35" y="275" class="ln l9" fill="#c9d1d9">› Applied Machine Learning</text>
      <text x="35" y="295" class="ln l10" fill="#c9d1d9">› Full Stack Engineering</text>
      
      <text x="20" y="325" fill="#ff7b72" class="ln l13">Current_Work:</text>
      <text x="35" y="345" class="ln l14" fill="#c9d1d9">› Building scalable end-to-end systems</text>
      <text x="35" y="365" class="ln l16" fill="#c9d1d9">› Exploring LLMs &amp; cloud-native architectures</text>
      
      <text x="20" y="400" fill="#ff7b72" class="ln l17">Quote:</text>
      <text x="20" y="420" fill="#e3b341" class="ln l18">"Performance is engineered. Security is enforced. Scalability is designed."</text>
    </g>

    <text x="20" y="460" font-family="monospace" font-size="14" class="ln l19">
      <tspan fill="#3fb950">aabidnabi</tspan><tspan fill="#8b949e">@</tspan><tspan fill="#58a6ff">terminal</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#79c0ff">~</tspan><tspan fill="#c9d1d9">$ </tspan>
      <tspan class="c e1" fill="#e6edf3">e</tspan><tspan class="c e2" fill="#e6edf3">x</tspan><tspan class="c e3" fill="#e6edf3">i</tspan><tspan class="c e4" fill="#e6edf3">t</tspan>
    </text>

    <rect x="180" y="446" width="8" height="16" class="cursor cur2"/>

  </g>
</svg>
