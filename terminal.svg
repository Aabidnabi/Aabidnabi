<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%">
  <defs>
    <style>
      .ln { opacity: 0; animation: slideIn 0.2s ease-out forwards; }

      .l1  { animation-delay: 0.9s; }  .l2  { animation-delay: 1.0s; }
      .l3  { animation-delay: 1.1s; }  .l4  { animation-delay: 1.2s; }
      .l5  { animation-delay: 1.3s; }  .l6  { animation-delay: 1.4s; }
      .l7  { animation-delay: 1.5s; }  .l8  { animation-delay: 1.6s; }
      .l9  { animation-delay: 1.7s; }  .l10 { animation-delay: 1.8s; }
      .l11 { animation-delay: 1.9s; }  .l12 { animation-delay: 2.0s; }
      .l13 { animation-delay: 2.1s; }  .l14 { animation-delay: 2.2s; }
      .l15 { animation-delay: 2.3s; }  .l16 { animation-delay: 2.4s; }

      .l-final { animation-delay: 2.7s; }

      /* Exit sequence */
      .e1 { animation-delay: 2.9s; }
      .e2 { animation-delay: 3.0s; }
      .e3 { animation-delay: 3.1s; }
      .e4 { animation-delay: 3.2s; }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>

    <clipPath id="roundCorner">
      <rect width="800" height="450" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundCorner)">
    <rect width="800" height="450" fill="#0d1117"/>

    <rect width="800" height="35" fill="#161b22"/>
    <circle cx="15" cy="17.5" r="5" fill="#ff5f57"/>
    <circle cx="32" cy="17.5" r="5" fill="#ffbd2e"/>
    <circle cx="49" cy="17.5" r="5" fill="#28c840"/>

    <text x="400" y="22" text-anchor="middle"
          font-family="monospace" font-size="11" fill="#8b949e">
      aabidnabi — terminal
    </text>

    <g font-family="monospace" font-size="12">
      <text x="20" y="65">
        <tspan fill="#3fb950">aabidnabi</tspan>
        <tspan fill="#8b949e">@</tspan>
        <tspan fill="#58a6ff">terminal</tspan>
        <tspan fill="#8b949e">:</tspan>
        <tspan fill="#79c0ff">~</tspan>
        <tspan fill="#c9d1d9">$ </tspan>

        <tspan fill="#e6edf3">w</tspan>
        <tspan fill="#e6edf3">h</tspan>
        <tspan fill="#e6edf3">o</tspan>
        <tspan fill="#e6edf3">a</tspan>
        <tspan fill="#e6edf3">m</tspan>
        <tspan fill="#e6edf3">i</tspan>
      </text>

      <text x="20" y="90" class="ln l1">
        <tspan fill="#79c0ff">Name</tspan>
        <tspan fill="#484f58">: </tspan>
        <tspan fill="#e6edf3">Aabid Nabi</tspan>
      </text>

      <text x="20" y="108" class="ln l2">
        <tspan fill="#79c0ff">Role</tspan>
        <tspan fill="#484f58">: </tspan>
        <tspan fill="#e6edf3">Software Developer | Scalable Systems &amp; AI</tspan>
      </text>

      <text x="20" y="135" fill="#ff7b72" class="ln l3">Focus:</text>
      <text x="35" y="153" class="ln l4" fill="#c9d1d9">› Production-grade system design</text>
      <text x="35" y="171" class="ln l5" fill="#c9d1d9">› Clean architecture and maintainability</text>
      <text x="35" y="189" class="ln l6" fill="#c9d1d9">› Performance optimization and scalability</text>
      <text x="35" y="207" class="ln l7" fill="#c9d1d9">› Secure system development</text>

      <text x="20" y="235" fill="#ff7b72" class="ln l8">Interests:</text>
      <text x="35" y="253" class="ln l9" fill="#c9d1d9">› Applied Machine Learning</text>
      <text x="35" y="271" class="ln l10" fill="#c9d1d9">› Full Stack Engineering &amp; Distributed Systems</text>
      <text x="35" y="289" class="ln l11" fill="#c9d1d9">› Cybersecurity</text>

      <text x="20" y="317" fill="#ff7b72" class="ln l12">Quote:</text>
      <text x="20" y="335" fill="#e3b341" class="ln l13">
        "Performance is engineered. Security is enforced. Scalability is designed."
      </text>

      <text x="20" y="375" class="ln l-final">
        <tspan fill="#3fb950">aabidnabi</tspan>
        <tspan fill="#8b949e">@</tspan>
        <tspan fill="#58a6ff">terminal</tspan>
        <tspan fill="#8b949e">:</tspan>
        <tspan fill="#79c0ff">~</tspan>
        <tspan fill="#c9d1d9">$ </tspan>

        <tspan class="e1" fill="#e6edf3">e</tspan>
        <tspan class="e2" fill="#e6edf3">x</tspan>
        <tspan class="e3" fill="#e6edf3">i</tspan>
        <tspan class="e4" fill="#e6edf3">t</tspan>
      </text>
    </g>
  </g>
</svg>
